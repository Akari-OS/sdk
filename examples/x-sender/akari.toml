# AKARI App Manifest — AKARI App SDK (MCP-Declarative Tier)
# Reference implementation for the Publishing category.
#
# This file demonstrates:
#   - tier = "mcp-declarative": Shell handles rendering, HITL, Permission API
#   - [permissions]: minimum-required declaration (default deny)
#   - [mcp]: bundled MCP server + tool declarations
#   - [panels]: JSON Schema–based UI declaration (no React needed)

[app]
id       = "com.akari.example.x-sender"
name     = "X Sender"
version  = "0.1.0"
author   = "akari-os-examples"
tier     = "mcp-declarative"        # MCP server + panel.schema.json are enough
sdk      = ">=0.1.0 <1.0"           # Core SDK compatibility range
category = "publishing"             # HUB-005 v0.2 Publishing category

[mcp]
# Relative path to the MCP server entry point (Node.js process).
# The Shell spawns this process and communicates via stdio (StdioServerTransport).
# NOTE: The shell runs this file directly via `node <path>`, so it must point to
# a pre-built ESM artifact (run `pnpm build` to emit `dist/mcp-server/index.js`).
# To use a remote / npm-packaged MCP instead, set: server = "npm:@acme/x-mcp"
server = "dist/mcp-server/index.js"

# Every tool listed here MUST be implemented in mcp-server/ AND referenced in panel.schema.json.
# akari app certify verifies this triple-consistency automatically.
tools = [
  "x.post",
  "x.schedule",
  "x.draft_save",
  "x.get_me",
]

[panels]
# Shell's generic Schema Renderer reads this JSON Schema and draws the form.
# No React code required — the Shell handles all widget rendering.
main = { title = "X", schema = "panel.schema.json" }

[permissions]
# Default deny. Declare only what this app actually needs.
# Shell blocks any operation not listed here; akari app certify also verifies this.

# External HTTP — restricted to X API domains only
external-network = ["api.x.com", "api.twitter.com"]

# OAuth — allowed to initiate OAuth 2.0 PKCE flow for x.com
oauth = ["x.com"]

# Keychain — restricted to this app's own service name
# (MCP server stores access_token / refresh_token / token_expiry here)
keychain = ["com.akari.example.x-sender"]

# Memory layer — Pool for drafts & media refs, AMP for publish-action records
pool = ["read", "write"]
amp  = ["write"]
